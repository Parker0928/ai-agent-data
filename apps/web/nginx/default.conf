upstream nest_api {
  server api:3000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;

  root /usr/share/nginx/html;
  index index.html;

  # 兼容旧路径 POST /auth/login、GET /auth/me（映射到 Nest /api/auth/*）
  location ^~ /auth/ {
    proxy_pass http://nest_api/api/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_buffering off;
    proxy_cache off;
  }

  # 仅转发 /api/* 到 Nest，避免 /chat、/overview 等与前端路由冲突
  location ^~ /api/ {
    proxy_pass http://nest_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_buffering off;
    proxy_cache off;
  }

  # SPA fallback: for any unknown route, serve index.html so Vue Router can handle it.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Keep static assets cached a bit longer.
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|json|map)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
